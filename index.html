<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grudge Metaverse — Grudge Studio</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
    #ui-overlay {
      position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10;
      padding: 16px; display: flex; justify-content: space-between; align-items: flex-start;
    }
    #ui-overlay > * { pointer-events: auto; }
    .hud-panel {
      background: rgba(10, 10, 20, 0.85); border: 1px solid rgba(200, 168, 75, 0.3);
      border-radius: 8px; padding: 12px 16px; color: #e0d6c0;
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px;
      backdrop-filter: blur(8px);
    }
    .hud-panel h1 { font-size: 16px; color: #c8a84b; margin-bottom: 4px; letter-spacing: 1px; }
    .hud-panel .sub { color: #8a8070; font-size: 11px; }
    .controls { line-height: 1.6; }
    .controls kbd {
      background: rgba(200, 168, 75, 0.15); border: 1px solid rgba(200, 168, 75, 0.3);
      border-radius: 3px; padding: 1px 6px; font-family: monospace; font-size: 12px; color: #c8a84b;
    }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #0a0a0f; z-index: 100;
      color: #c8a84b; font-family: 'Segoe UI', system-ui, sans-serif;
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading h1 { font-size: 28px; letter-spacing: 3px; margin-bottom: 12px; }
    #loading p { color: #8a8070; font-size: 14px; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(200,168,75,0.2);
      border-top-color: #c8a84b; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
